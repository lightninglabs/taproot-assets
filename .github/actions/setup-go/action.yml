name: "Setup Go environment"
description: >-
  Set up Go and configure caching. When key-prefix is provided,
  uses a custom cache keyed by prefix to avoid cache collisions
  between jobs with different build tags.
inputs:
  go-version:
    description: "The version of Go to set up"
    required: true
  key-prefix:
    description: >-
      A prefix for the cache key, to separate cache entries
      between jobs. When provided, disables setup-go's default
      cache and uses actions/cache with a prefixed key instead.
    required: false

runs:
  using: "composite"

  steps:
    - name: setup go ${{ inputs.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: '${{ inputs.go-version }}'
        cache: ${{ inputs.key-prefix == '' }}

    - name: cache go (custom key)
      if: inputs.key-prefix != ''
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          /home/runner/work/go/pkg/mod
        key: >-
          ${{ inputs.key-prefix }}-go-${{ runner.os }}-${{ runner.arch }}-${{ inputs.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: >-
          ${{ inputs.key-prefix }}-go-${{ runner.os }}-${{ runner.arch }}-${{ inputs.go-version }}-
